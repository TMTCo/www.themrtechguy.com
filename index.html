<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TheMrTechGuy.com – TMTCo</title>

  <!-- ✅ LOCAL MSAL (fixes CDN/CSP issues) -->
  <script src="/js/msal-browser.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
  /* (unchanged styles from your original file) */
  :root {
    --bg:#0b0e14;--surface:#12161f;--surface2:#1a1f2e;--border:#242938;
    --accent:#3b82f6;--accent2:#60a5fa;--text:#e8eaf0;--muted:#8892a4;
    --heading:'Syne',sans-serif;--body:'DM Sans',sans-serif;--radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--bg);color:var(--text)}
  .view{display:none}.view.active{display:block}

  #passreset-gate{position:fixed;inset:0;background:rgba(11,14,20,.97);display:none;align-items:center;justify-content:center}
  #passreset-gate.active{display:flex}

  .ms-login-btn{padding:.8rem 1.5rem;border-radius:10px;border:none;cursor:pointer}
  </style>
</head>
<body>

<script>
const VIEWS=['home','tech','passreset','idcallback','tos','contact'];
function _activateView(name){
  VIEWS.forEach(v=>{
    const el=document.getElementById('view-'+v);
    if(el) el.classList.toggle('active',v===name);
  });
  window.scrollTo(0,0);
}

function showView(name){
  if(name==='passreset'){
    document.getElementById('passreset-gate').classList.add('active');

    if(msalInstance){
      const acc=msalInstance.getAllAccounts();
      if(acc.length>0){
        onLoginSuccess(acc[0]);
        return;
      }
    }
    return;
  }
  _activateView(name);
}
</script>

<div id="passreset-gate">
  <div>
    <h2>Authorised Access Only</h2>
    <button id="ms-login-btn" class="ms-login-btn" onclick="msalLogin()" disabled>
      Sign in with Microsoft
    </button>
    <p id="login-error"></p>
  </div>
</div>

<nav>
  <button onclick="showView('home')">Home</button>
  <button onclick="showView('passreset')">Password Reset</button>
</nav>

<div id="view-home" class="view active"><h1>Home</h1></div>

<div id="view-passreset" class="view">
  <h1>Protected Portal</h1>
  <button onclick="msalLogout()">Logout</button>
</div>

<script>
// ✅ CONFIG
const TENANT_ID='f1011f75-0d96-4d08-b8d4-6c79c851f9ba';
const CLIENT_ID='db8b6556-cec8-4b83-94b1-364cefd24203';

let msalInstance=null;
const loginRequest={scopes:['openid','profile','User.Read']};

function initMsal(){
  msalInstance=new msal.PublicClientApplication({
    auth:{
      clientId:CLIENT_ID,
      authority:'https://login.microsoftonline.com/'+TENANT_ID,
      redirectUri:window.location.origin
    },
    cache:{cacheLocation:'localStorage'}
  });

  msalInstance.handleRedirectPromise().then(res=>{
    if(res){
      onLoginSuccess(res.account);
      return;
    }

    const acc=msalInstance.getAllAccounts();
    if(acc.length>0){
      onLoginSuccess(acc[0]);
    }
  }).catch(()=>showError('Login failed'));

  document.getElementById('ms-login-btn').disabled=false;
}

function msalLogin(){
  if(!msalInstance) return showError('MSAL failed to init');
  msalInstance.loginRedirect(loginRequest);
}

function msalLogout(){
  msalInstance.logoutRedirect({postLogoutRedirectUri:window.location.origin});
}

function onLoginSuccess(account){
  document.getElementById('passreset-gate').classList.remove('active');
  _activateView('passreset');
}

function showError(msg){
  document.getElementById('login-error').innerText=msg;
}

// ✅ INIT immediately (no dynamic loading anymore)
initMsal();
</script>

</body>
</html>
